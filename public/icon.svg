<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#10B981"/>
  <!-- Pixel art "A" - left side -->
  <!-- Top -->
  <rect x="4" y="6" width="2" height="2" fill="#fff"/>
  <rect x="6" y="6" width="2" height="2" fill="#fff"/>
  <rect x="8" y="6" width="2" height="2" fill="#fff"/>
  <!-- Sides row 2 -->
  <rect x="2" y="8" width="2" height="2" fill="#fff"/>
  <rect x="10" y="8" width="2" height="2" fill="#fff"/>
  <!-- Sides row 3 -->
  <rect x="2" y="10" width="2" height="2" fill="#fff"/>
  <rect x="10" y="10" width="2" height="2" fill="#fff"/>
  <!-- Middle bar -->
  <rect x="2" y="12" width="2" height="2" fill="#fff"/>
  <rect x="4" y="12" width="2" height="2" fill="#fff"/>
  <rect x="6" y="12" width="2" height="2" fill="#fff"/>
  <rect x="8" y="12" width="2" height="2" fill="#fff"/>
  <rect x="10" y="12" width="2" height="2" fill="#fff"/>
  <!-- Sides row 5 -->
  <rect x="2" y="14" width="2" height="2" fill="#fff"/>
  <rect x="10" y="14" width="2" height="2" fill="#fff"/>
  <!-- Sides row 6 -->
  <rect x="2" y="16" width="2" height="2" fill="#fff"/>
  <rect x="10" y="16" width="2" height="2" fill="#fff"/>
  <!-- Legs -->
  <rect x="2" y="18" width="2" height="2" fill="#fff"/>
  <rect x="10" y="18" width="2" height="2" fill="#fff"/>
  <!-- Pixel art "T" - right side -->
  <!-- Top bar -->
  <rect x="16" y="6" width="2" height="2" fill="#fff"/>
  <rect x="18" y="6" width="2" height="2" fill="#fff"/>
  <rect x="20" y="6" width="2" height="2" fill="#fff"/>
  <rect x="22" y="6" width="2" height="2" fill="#fff"/>
  <rect x="24" y="6" width="2" height="2" fill="#fff"/>
  <rect x="26" y="6" width="2" height="2" fill="#fff"/>
  <rect x="28" y="6" width="2" height="2" fill="#fff"/>
  <!-- Stem -->
  <rect x="20" y="8" width="2" height="2" fill="#fff"/>
  <rect x="22" y="8" width="2" height="2" fill="#fff"/>
  <rect x="20" y="10" width="2" height="2" fill="#fff"/>
  <rect x="22" y="10" width="2" height="2" fill="#fff"/>
  <rect x="20" y="12" width="2" height="2" fill="#fff"/>
  <rect x="22" y="12" width="2" height="2" fill="#fff"/>
  <rect x="20" y="14" width="2" height="2" fill="#fff"/>
  <rect x="22" y="14" width="2" height="2" fill="#fff"/>
  <rect x="20" y="16" width="2" height="2" fill="#fff"/>
  <rect x="22" y="16" width="2" height="2" fill="#fff"/>
  <rect x="20" y="18" width="2" height="2" fill="#fff"/>
  <rect x="22" y="18" width="2" height="2" fill="#fff"/>
  <!-- Pixel grid dots for texture -->
  <rect x="2" y="24" width="2" height="2" fill="#059669" opacity="0.5"/>
  <rect x="6" y="24" width="2" height="2" fill="#059669" opacity="0.5"/>
  <rect x="10" y="24" width="2" height="2" fill="#059669" opacity="0.5"/>
  <rect x="20" y="24" width="2" height="2" fill="#059669" opacity="0.5"/>
  <rect x="24" y="24" width="2" height="2" fill="#059669" opacity="0.5"/>
  <rect x="28" y="24" width="2" height="2" fill="#059669" opacity="0.5"/>
</svg>
