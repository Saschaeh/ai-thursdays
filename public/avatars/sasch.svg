<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Sasch: Purple/Violet Wizard/Mage -->
  <!-- Row 0: hat tip -->
  <rect x="50" y="0" width="10" height="10" fill="#CE93D8"/>
  <!-- Row 1: hat upper -->
  <rect x="40" y="10" width="10" height="10" fill="#8E24AA"/>
  <rect x="50" y="10" width="10" height="10" fill="#AB47BC"/>
  <!-- Row 2: hat wide -->
  <rect x="30" y="20" width="10" height="10" fill="#6A1B9A"/>
  <rect x="40" y="20" width="10" height="10" fill="#8E24AA"/>
  <rect x="50" y="20" width="10" height="10" fill="#AB47BC"/>
  <!-- Row 3: hat brim + face -->
  <rect x="10" y="30" width="10" height="10" fill="#4A148C"/>
  <rect x="20" y="30" width="10" height="10" fill="#6A1B9A"/>
  <rect x="30" y="30" width="10" height="10" fill="#6A1B9A"/>
  <rect x="40" y="30" width="10" height="10" fill="#6A1B9A"/>
  <rect x="50" y="30" width="10" height="10" fill="#6A1B9A"/>
  <rect x="60" y="30" width="10" height="10" fill="#4A148C"/>
  <!-- Row 4: face + eyes -->
  <rect x="20" y="40" width="10" height="10" fill="#FFCC80"/>
  <rect x="30" y="40" width="10" height="10" fill="#E1BEE7"/>
  <rect x="40" y="40" width="10" height="10" fill="#FFCC80"/>
  <rect x="50" y="40" width="10" height="10" fill="#E1BEE7"/>
  <!-- Row 5: beard -->
  <rect x="20" y="50" width="10" height="10" fill="#FFCC80"/>
  <rect x="30" y="50" width="10" height="10" fill="#BDBDBD"/>
  <rect x="40" y="50" width="10" height="10" fill="#E0E0E0"/>
  <rect x="50" y="50" width="10" height="10" fill="#BDBDBD"/>
  <!-- Row 6: robe + staff -->
  <rect x="0" y="60" width="10" height="10" fill="#CE93D8"/>
  <rect x="10" y="60" width="10" height="10" fill="#8E24AA"/>
  <rect x="20" y="60" width="10" height="10" fill="#AB47BC"/>
  <rect x="30" y="60" width="10" height="10" fill="#CE93D8"/>
  <rect x="40" y="60" width="10" height="10" fill="#AB47BC"/>
  <rect x="50" y="60" width="10" height="10" fill="#8E24AA"/>
  <rect x="60" y="60" width="10" height="10" fill="#795548"/>
  <!-- Row 7: robe bottom + staff -->
  <rect x="10" y="70" width="10" height="10" fill="#6A1B9A"/>
  <rect x="20" y="70" width="10" height="10" fill="#8E24AA"/>
  <rect x="30" y="70" width="10" height="10" fill="#AB47BC"/>
  <rect x="40" y="70" width="10" height="10" fill="#AB47BC"/>
  <rect x="50" y="70" width="10" height="10" fill="#6A1B9A"/>
  <rect x="60" y="70" width="10" height="10" fill="#795548"/>
</svg>