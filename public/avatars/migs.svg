<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Migs: Green Explorer/Adventurer -->
  <!-- Row 0: hat top -->
  <rect x="20" y="0" width="10" height="10" fill="#2E7D32"/>
  <rect x="30" y="0" width="10" height="10" fill="#388E3C"/>
  <rect x="40" y="0" width="10" height="10" fill="#388E3C"/>
  <rect x="50" y="0" width="10" height="10" fill="#2E7D32"/>
  <!-- Row 1: hat brim -->
  <rect x="10" y="10" width="10" height="10" fill="#1B5E20"/>
  <rect x="20" y="10" width="10" height="10" fill="#2E7D32"/>
  <rect x="30" y="10" width="10" height="10" fill="#43A047"/>
  <rect x="40" y="10" width="10" height="10" fill="#43A047"/>
  <rect x="50" y="10" width="10" height="10" fill="#2E7D32"/>
  <rect x="60" y="10" width="10" height="10" fill="#1B5E20"/>
  <!-- Row 2: face top -->
  <rect x="20" y="20" width="10" height="10" fill="#FFCC80"/>
  <rect x="30" y="20" width="10" height="10" fill="#FFCC80"/>
  <rect x="40" y="20" width="10" height="10" fill="#FFCC80"/>
  <rect x="50" y="20" width="10" height="10" fill="#FFCC80"/>
  <!-- Row 3: eyes -->
  <rect x="20" y="30" width="10" height="10" fill="#FFCC80"/>
  <rect x="30" y="30" width="10" height="10" fill="#1B5E20"/>
  <rect x="40" y="30" width="10" height="10" fill="#FFCC80"/>
  <rect x="50" y="30" width="10" height="10" fill="#1B5E20"/>
  <!-- Row 4: mouth/smile -->
  <rect x="20" y="40" width="10" height="10" fill="#FFCC80"/>
  <rect x="30" y="40" width="10" height="10" fill="#FFCC80"/>
  <rect x="40" y="40" width="10" height="10" fill="#795548"/>
  <rect x="50" y="40" width="10" height="10" fill="#FFCC80"/>
  <!-- Row 5: body + backpack -->
  <rect x="10" y="50" width="10" height="10" fill="#795548"/>
  <rect x="20" y="50" width="10" height="10" fill="#43A047"/>
  <rect x="30" y="50" width="10" height="10" fill="#66BB6A"/>
  <rect x="40" y="50" width="10" height="10" fill="#66BB6A"/>
  <rect x="50" y="50" width="10" height="10" fill="#43A047"/>
  <rect x="60" y="50" width="10" height="10" fill="#795548"/>
  <!-- Row 6: body lower -->
  <rect x="10" y="60" width="10" height="10" fill="#795548"/>
  <rect x="20" y="60" width="10" height="10" fill="#2E7D32"/>
  <rect x="30" y="60" width="10" height="10" fill="#43A047"/>
  <rect x="40" y="60" width="10" height="10" fill="#43A047"/>
  <rect x="50" y="60" width="10" height="10" fill="#2E7D32"/>
  <rect x="60" y="60" width="10" height="10" fill="#795548"/>
  <!-- Row 7: boots -->
  <rect x="10" y="70" width="10" height="10" fill="#4E342E"/>
  <rect x="20" y="70" width="10" height="10" fill="#5D4037"/>
  <rect x="50" y="70" width="10" height="10" fill="#5D4037"/>
  <rect x="60" y="70" width="10" height="10" fill="#4E342E"/>
</svg>