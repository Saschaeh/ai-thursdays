<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Dan: Blue/Navy Robot -->
  <!-- Row 0: antenna -->
  <rect x="30" y="0" width="10" height="10" fill="#4FC3F7"/>
  <rect x="40" y="0" width="10" height="10" fill="#4FC3F7"/>
  <!-- Row 1: head top -->
  <rect x="20" y="10" width="10" height="10" fill="#1565C0"/>
  <rect x="30" y="10" width="10" height="10" fill="#1E88E5"/>
  <rect x="40" y="10" width="10" height="10" fill="#1E88E5"/>
  <rect x="50" y="10" width="10" height="10" fill="#1565C0"/>
  <!-- Row 2: eyes -->
  <rect x="10" y="20" width="10" height="10" fill="#1565C0"/>
  <rect x="20" y="20" width="10" height="10" fill="#1E88E5"/>
  <rect x="30" y="20" width="10" height="10" fill="#E0F7FA"/>
  <rect x="40" y="20" width="10" height="10" fill="#1E88E5"/>
  <rect x="50" y="20" width="10" height="10" fill="#E0F7FA"/>
  <rect x="60" y="20" width="10" height="10" fill="#1565C0"/>
  <!-- Row 3: mouth -->
  <rect x="10" y="30" width="10" height="10" fill="#1565C0"/>
  <rect x="20" y="30" width="10" height="10" fill="#1E88E5"/>
  <rect x="30" y="30" width="10" height="10" fill="#0D47A1"/>
  <rect x="40" y="30" width="10" height="10" fill="#0D47A1"/>
  <rect x="50" y="30" width="10" height="10" fill="#1E88E5"/>
  <rect x="60" y="30" width="10" height="10" fill="#1565C0"/>
  <!-- Row 4: neck -->
  <rect x="30" y="40" width="10" height="10" fill="#90CAF9"/>
  <rect x="40" y="40" width="10" height="10" fill="#90CAF9"/>
  <!-- Row 5: body top -->
  <rect x="10" y="50" width="10" height="10" fill="#1565C0"/>
  <rect x="20" y="50" width="10" height="10" fill="#1E88E5"/>
  <rect x="30" y="50" width="10" height="10" fill="#4FC3F7"/>
  <rect x="40" y="50" width="10" height="10" fill="#4FC3F7"/>
  <rect x="50" y="50" width="10" height="10" fill="#1E88E5"/>
  <rect x="60" y="50" width="10" height="10" fill="#1565C0"/>
  <!-- Row 6: body bottom -->
  <rect x="10" y="60" width="10" height="10" fill="#0D47A1"/>
  <rect x="20" y="60" width="10" height="10" fill="#1565C0"/>
  <rect x="30" y="60" width="10" height="10" fill="#1E88E5"/>
  <rect x="40" y="60" width="10" height="10" fill="#1E88E5"/>
  <rect x="50" y="60" width="10" height="10" fill="#1565C0"/>
  <rect x="60" y="60" width="10" height="10" fill="#0D47A1"/>
  <!-- Row 7: feet -->
  <rect x="10" y="70" width="10" height="10" fill="#0D47A1"/>
  <rect x="20" y="70" width="10" height="10" fill="#0D47A1"/>
  <rect x="50" y="70" width="10" height="10" fill="#0D47A1"/>
  <rect x="60" y="70" width="10" height="10" fill="#0D47A1"/>
</svg>