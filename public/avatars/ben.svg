<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Ben: Red/Crimson Warrior/Knight -->
  <!-- Row 0: helmet crest -->
  <rect x="30" y="0" width="10" height="10" fill="#F44336"/>
  <rect x="40" y="0" width="10" height="10" fill="#F44336"/>
  <!-- Row 1: helmet -->
  <rect x="20" y="10" width="10" height="10" fill="#B71C1C"/>
  <rect x="30" y="10" width="10" height="10" fill="#D32F2F"/>
  <rect x="40" y="10" width="10" height="10" fill="#D32F2F"/>
  <rect x="50" y="10" width="10" height="10" fill="#B71C1C"/>
  <!-- Row 2: visor -->
  <rect x="10" y="20" width="10" height="10" fill="#B71C1C"/>
  <rect x="20" y="20" width="10" height="10" fill="#D32F2F"/>
  <rect x="30" y="20" width="10" height="10" fill="#FFCDD2"/>
  <rect x="40" y="20" width="10" height="10" fill="#424242"/>
  <rect x="50" y="20" width="10" height="10" fill="#FFCDD2"/>
  <rect x="60" y="20" width="10" height="10" fill="#B71C1C"/>
  <!-- Row 3: face guard -->
  <rect x="10" y="30" width="10" height="10" fill="#B71C1C"/>
  <rect x="20" y="30" width="10" height="10" fill="#9E9E9E"/>
  <rect x="30" y="30" width="10" height="10" fill="#757575"/>
  <rect x="40" y="30" width="10" height="10" fill="#757575"/>
  <rect x="50" y="30" width="10" height="10" fill="#9E9E9E"/>
  <rect x="60" y="30" width="10" height="10" fill="#B71C1C"/>
  <!-- Row 4: neck/gorget -->
  <rect x="20" y="40" width="10" height="10" fill="#9E9E9E"/>
  <rect x="30" y="40" width="10" height="10" fill="#BDBDBD"/>
  <rect x="40" y="40" width="10" height="10" fill="#BDBDBD"/>
  <rect x="50" y="40" width="10" height="10" fill="#9E9E9E"/>
  <!-- Row 5: armor + sword -->
  <rect x="0" y="50" width="10" height="10" fill="#BDBDBD"/>
  <rect x="10" y="50" width="10" height="10" fill="#D32F2F"/>
  <rect x="20" y="50" width="10" height="10" fill="#EF5350"/>
  <rect x="30" y="50" width="10" height="10" fill="#9E9E9E"/>
  <rect x="40" y="50" width="10" height="10" fill="#EF5350"/>
  <rect x="50" y="50" width="10" height="10" fill="#D32F2F"/>
  <rect x="60" y="50" width="10" height="10" fill="#E0E0E0"/>
  <!-- Row 6: armor lower + shield -->
  <rect x="0" y="60" width="10" height="10" fill="#9E9E9E"/>
  <rect x="10" y="60" width="10" height="10" fill="#B71C1C"/>
  <rect x="20" y="60" width="10" height="10" fill="#D32F2F"/>
  <rect x="30" y="60" width="10" height="10" fill="#D32F2F"/>
  <rect x="40" y="60" width="10" height="10" fill="#D32F2F"/>
  <rect x="50" y="60" width="10" height="10" fill="#B71C1C"/>
  <rect x="60" y="60" width="10" height="10" fill="#BDBDBD"/>
  <!-- Row 7: boots -->
  <rect x="10" y="70" width="10" height="10" fill="#7f0000"/>
  <rect x="20" y="70" width="10" height="10" fill="#B71C1C"/>
  <rect x="50" y="70" width="10" height="10" fill="#B71C1C"/>
  <rect x="60" y="70" width="10" height="10" fill="#7f0000"/>
</svg>