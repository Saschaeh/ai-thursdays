<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo box -->
  <rect x="480" y="140" width="100" height="100" rx="20" fill="#10B981"/>
  <text x="530" y="210" text-anchor="middle" font-family="'Courier New', monospace" font-weight="900" font-size="52" fill="#fff">AT</text>
  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="64" fill="#fff">AI Thursdays</text>
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="28" fill="#9CA3AF">Idle Tuesday on Thursdays</text>
  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#6EE7B7">Track ideas. Assign topics. Collaborate.</text>
  <!-- Bottom accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#10B981"/>
</svg>
