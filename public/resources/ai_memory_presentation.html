function dirsFor(shape) {
  const out = [];
  if (shape === "radial") {
    for (let i = 0; i < 16; i++) {
      const a = i * Math.PI / 8;
      const r = 36 + (i % 2) * 5;
      out.push({ dx: Math.round(r * Math.sin(a)), dy: Math.round(-r * Math.cos(a)), s: 3 - (i % 2) });
    }
  } else if (shape === "snowflake") {
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3;
      for (let d = 1; d <= 3; d++) {
        const r = d * 12;
        out.push({ dx: Math.round(r * Math.sin(a)), dy: Math.round(-r * Math.cos(a)), s: d === 3 ? 2 : 3 });
      }
    }
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3;
      const r = 22;
      out.push({ dx: Math.round(r * Math.sin(a + Math.PI / 9)), dy: Math.round(-r * Math.cos(a + Math.PI / 9)), s: 1 });
      out.push({ dx: Math.round(r * Math.sin(a - Math.PI / 9)), dy: Math.round(-r * Math.cos(a - Math.PI / 9)), s: 1 });
    }
  } else if (shape === "ring") {
    for (let i = 0; i < 14; i++) {
      const a = i * Math.PI / 7;
      const r = 36;
      out.push({ dx: Math.round(r * Math.sin(a)), dy: Math.round(-r * Math.cos(a)), s: 3 });
    }
  } else if (shape === "star") {
    for (let i = 0; i < 5; i++) {
      const a = i * 2 * Math.PI / 5;
      for (let d = 1; d <= 3; d++) {
        const r = d * 13;
        out.push({ dx: Math.round(r * Math.sin(a)), dy: Math.round(-r * Math.cos(a)), s: d === 3 ? 4 : 3 });
      }
    }
    for (let i = 0; i < 5; i++) {
      const a = (i + 0.5) * 2 * Math.PI / 5;
      const r = 14;
      out.push({ dx: Math.round(r * Math.sin(a)), dy: Math.round(-r * Math.cos(a)), s: 2 });
    }
  } else if (shape === "dense") {
    for (let i = 0; i < 20; i++) {
      const a = i * Math.PI / 10;
      const r = 30 + (i % 3) * 7;
      out.push({ dx: Math.round(r * Math.sin(a)), dy: Math.round(-r * Math.cos(a)), s: 2 + (i % 2) });
    }
  }
  return out;
}

const DESIGN_W = 960, DESIGN_H = 540;

function App() {
  const [slide, setSlide] = useState(0);
  const [scale, setScale] = useState(1);
  const total = SLIDES.length;
  const next = useCallback(() => setSlide(s => Math.min(s + 1, total - 1)), [total]);
  const prev = useCallback(() => setSlide(s => Math.max(s - 1, 0)), []);

  useEffect(() => {
    const update = () => {
      const availW = window.innerWidth - 16;
      const availH = window.innerHeight - 16;
      const s = Math.min(availW / DESIGN_W, availH / DESIGN_H);
      setScale(s > 0 ? s : 1);
    };
    update();
    window.addEventListener("resize", update);
    return () => window.removeEventListener("resize", update);
  }, []);

  useEffect(() => {
    const handler = (ev) => {
      if (ev.key === "ArrowRight" || ev.key === " ") { ev.preventDefault(); next(); }
      if (ev.key === "ArrowLeft") { ev.preventDefault(); prev(); }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [next, prev]);

  const scaledW = DESIGN_W * scale;
  const scaledH = DESIGN_H * scale;

  return e("div", { style: {
    position: "fixed", inset: 0,
    background: "#0f0f1a", color: "#ccc", fontFamily: "monospace",
    display: "flex", alignItems: "center", justifyContent: "center",
    userSelect: "none", overflow: "hidden"
  }},
    e("div", { style: { width: scaledW, height: scaledH, position: "relative" }},
      e("div", { style: {
        width: DESIGN_W, height: DESIGN_H,
        transform: "scale(" + scale + ")", transformOrigin: "top left",
        position: "absolute", top: 0, left: 0,
        overflow: "hidden", border: "3px solid #222", boxSizing: "border-box"
      }},
        e("div", { style: {
          position: "absolute", inset: 0, pointerEvents: "none", zIndex: 0,
          backgroundImage: "linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px)",
          backgroundSize: "24px 24px"
        }}),
        e("div", { style: { position: "relative", zIndex: 1, height: "100%", padding: "24px 36px", boxSizing: "border-box", display: "flex", flexDirection: "column" }},
          SLIDES[slide]()
        )
      )
    ),
    e("div", { style: {
      position: "fixed", bottom: 10, left: "50%", transform: "translateX(-50%)",
      display: "flex", alignItems: "center", gap: 14,
      padding: "6px 14px", background: "rgba(10,10,20,0.75)",
      border: "1px solid #222", zIndex: 10
    }},
      e("button", { onClick: prev, disabled: slide === 0, style: {
        background: "none", border: "2px solid #333", color: slide === 0 ? "#333" : "#64ffda",
        padding: "5px 12px", fontFamily: "monospace", fontSize: 11, cursor: slide === 0 ? "default" : "pointer"
      }}, "\u25C0 PREV"),
      e("div", { style: { display: "flex", gap: 4, alignItems: "center" }},
        SLIDES.map((_, i) => e("div", { key: i, onClick: () => setSlide(i), style: {
          width: i === slide ? 16 : 6, height: 6,
          background: i === slide ? "#64ffda" : "#333",
          cursor: "pointer", transition: "all 0.15s"
        }})),
        e("span", { style: { marginLeft: 10, color: "#666", fontSize: 11 }}, (slide + 1) + " / " + total)
      ),
      e("button", { onClick: next, disabled: slide === total - 1, style: {
        background: "none", border: "2px solid #333", color: slide === total - 1 ? "#333" : "#64ffda",
        padding: "5px 12px", fontFamily: "monospace", fontSize: 11, cursor: slide === total - 1 ? "default" : "pointer"
      }}, "NEXT \u25B6")
    )
  );
}
