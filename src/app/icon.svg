<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <!-- Background with gradient -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Subtle grid texture -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#000" opacity="0.1"/>

  <!-- Shadow layer for "A" -->
  <rect x="7" y="15" width="4" height="4" fill="#064E3B" opacity="0.5"/>
  <rect x="11" y="15" width="4" height="4" fill="#064E3B" opacity="0.5"/>
  <rect x="15" y="15" width="4" height="4" fill="#064E3B" opacity="0.5"/>
  <rect x="3" y="19" width="4" height="4" fill="#064E3B" opacity="0.5"/>
  <rect x="19" y="19" width="4" height="4" fill="#064E3B" opacity="0.5"/>

  <!-- Letter "A" - bold pixel art -->
  <!-- Row 1: top -->
  <rect x="10" y="12" width="4" height="4" fill="#fff"/>
  <rect x="14" y="12" width="4" height="4" fill="#fff"/>
  <!-- Row 2 -->
  <rect x="6" y="16" width="4" height="4" fill="#fff"/>
  <rect x="18" y="16" width="4" height="4" fill="#fff"/>
  <!-- Row 3 -->
  <rect x="6" y="20" width="4" height="4" fill="#fff"/>
  <rect x="18" y="20" width="4" height="4" fill="#fff"/>
  <!-- Row 4: crossbar -->
  <rect x="6" y="24" width="4" height="4" fill="#fff"/>
  <rect x="10" y="24" width="4" height="4" fill="#A7F3D0"/>
  <rect x="14" y="24" width="4" height="4" fill="#A7F3D0"/>
  <rect x="18" y="24" width="4" height="4" fill="#fff"/>
  <!-- Row 5 -->
  <rect x="6" y="28" width="4" height="4" fill="#fff"/>
  <rect x="18" y="28" width="4" height="4" fill="#fff"/>
  <!-- Row 6: legs -->
  <rect x="6" y="32" width="4" height="4" fill="#E2E8F0"/>
  <rect x="18" y="32" width="4" height="4" fill="#E2E8F0"/>

  <!-- Shadow layer for "T" -->
  <rect x="31" y="15" width="4" height="4" fill="#064E3B" opacity="0.5"/>
  <rect x="35" y="15" width="4" height="4" fill="#064E3B" opacity="0.5"/>
  <rect x="39" y="15" width="4" height="4" fill="#064E3B" opacity="0.5"/>
  <rect x="43" y="15" width="4" height="4" fill="#064E3B" opacity="0.5"/>
  <rect x="47" y="15" width="4" height="4" fill="#064E3B" opacity="0.5"/>
  <rect x="51" y="15" width="4" height="4" fill="#064E3B" opacity="0.5"/>
  <rect x="55" y="15" width="4" height="4" fill="#064E3B" opacity="0.5"/>

  <!-- Letter "T" - bold pixel art -->
  <!-- Row 1: top bar -->
  <rect x="30" y="12" width="4" height="4" fill="#fff"/>
  <rect x="34" y="12" width="4" height="4" fill="#fff"/>
  <rect x="38" y="12" width="4" height="4" fill="#fff"/>
  <rect x="42" y="12" width="4" height="4" fill="#fff"/>
  <rect x="46" y="12" width="4" height="4" fill="#fff"/>
  <rect x="50" y="12" width="4" height="4" fill="#fff"/>
  <rect x="54" y="12" width="4" height="4" fill="#fff"/>
  <!-- Stem -->
  <rect x="42" y="16" width="4" height="4" fill="#fff"/>
  <rect x="42" y="20" width="4" height="4" fill="#fff"/>
  <rect x="42" y="24" width="4" height="4" fill="#A7F3D0"/>
  <rect x="42" y="28" width="4" height="4" fill="#fff"/>
  <rect x="42" y="32" width="4" height="4" fill="#E2E8F0"/>

  <!-- Decorative pixels - sparkles -->
  <rect x="2" y="4" width="3" height="3" fill="#fff" opacity="0.3"/>
  <rect x="56" y="4" width="3" height="3" fill="#fff" opacity="0.2"/>
  <rect x="4" y="44" width="2" height="2" fill="#6EE7B7" opacity="0.4"/>
  <rect x="12" y="46" width="2" height="2" fill="#6EE7B7" opacity="0.3"/>
  <rect x="24" y="44" width="2" height="2" fill="#6EE7B7" opacity="0.4"/>
  <rect x="36" y="46" width="2" height="2" fill="#6EE7B7" opacity="0.3"/>
  <rect x="48" y="44" width="2" height="2" fill="#6EE7B7" opacity="0.4"/>
  <rect x="56" y="46" width="2" height="2" fill="#6EE7B7" opacity="0.3"/>

  <!-- Bottom accent line -->
  <rect x="8" y="52" width="4" height="2" fill="#34D399" opacity="0.5"/>
  <rect x="16" y="52" width="4" height="2" fill="#34D399" opacity="0.4"/>
  <rect x="24" y="52" width="4" height="2" fill="#34D399" opacity="0.5"/>
  <rect x="36" y="52" width="4" height="2" fill="#34D399" opacity="0.4"/>
  <rect x="44" y="52" width="4" height="2" fill="#34D399" opacity="0.5"/>
  <rect x="52" y="52" width="4" height="2" fill="#34D399" opacity="0.4"/>
</svg>
